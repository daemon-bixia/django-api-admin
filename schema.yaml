          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedGroup'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedGroup'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUpdatesResponse'
              examples:
                UpdateSuccessResponse:
                  value:
                    detail: The author “René Descartes” was changed successfully.
                    data:
                      id: 1
                      name: Renene Descartes
                      age: 60
                      is_vip: true
                      date_joined: '2025-02-05T04:12:12.191849Z'
                      title: null
                      user: 1
                      publisher:
                      - 1
                      pk: 1
                    updated_inlines:
                    - id: 1
                      title: The book of nine secrets
                      author: 1
                      credits:
                      - 2
                      pk: 1
                    - id: 2
                      title: purple thunder lightning technique
                      author: 1
                      credits:
                      - 2
                      pk: 2
                    deleted_inlines:
                    - id: 3
                      title: Pro git
                      author: 1
                      credits: []
                      pk: 3
                  summary: Example of a successful Update operation response
          description: Successfully returned the field attributes list
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
