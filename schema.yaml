  /api_admin/auth/group/changelist/:
    get:
      operationId: api_admin_auth_group_changelist_retrieve
      description: |-
        Return a JSON object representing the django admin changelist table.
        supports querystring filtering, pagination and search also changes based on list display.
      parameters:
      - in: query
        name: _to_field
        schema:
          type: string
          title: ' to field'
          minLength: 1
      - in: query
        name: all
        schema:
          type: boolean
      - in: query
        name: o
        schema:
          type: string
          minLength: 1
      - in: query
        name: p
        schema:
          type: integer
          minimum: 1
      - in: query
        name: q
        schema:
          type: string
          minLength: 1
      tags:
      - group
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangelistResponse'
              examples:
                SuccessResponse:
                  value:
                    action_form:
                      fields:
                      - type: CharField
                        name: field_name
                        attrs:
                          read_only: false
                          write_only: true
                          required: true
                          default: null
                          allow_blank: false
                          allow_null: false
                          label: Field name
                          help_text: null
                          initial: ''
                          max_length: null
                          min_length: null
                          trim_whitespace: true
                    config:
                      actions_on_top: true
                      actions_on_bottom: false
                      actions_selection_counter: true
                      empty_value_display: '-'
                      list_display:
                      - name
                      - age
                      - user
                      - is_old_enough
                      - title
                      - gender
                      list_display_links:
                      - name
                      list_editable:
                      - title
                      exclude:
                      - gender
                      show_full_result_count: true
                      list_per_page: 6
                      list_max_show_all: 200
                      date_hierarchy: date_joined
                      search_help_text: null
                      sortable_by: null
                      search_fields:
                      - name
                      - publisher__name
                      preserve_filters: true
                      full_count: 1
                      result_count: 1
                      action_choices:
                      - - delete_selected
                        - Delete selected authors
                      - - make_old
                        - make all authors old
                      - - make_young
                        - make all authors young
                      filters:
                      - title: is vip
                        choices:
                        - selected: true
                          query_string: '?'
                          display: All
                        - selected: false
                          query_string: ?is_vip__exact=1
                          display: 'Yes'
                        - selected: false
                          query_string: ?is_vip__exact=0
                          display: 'No'
                      - title: age
                        choices:
                        - selected: true
                          query_string: '?'
                          display: All
                        - selected: false
                          query_string: ?age__exact=60
                          display: senior
                        - selected: false
                          query_string: ?age__exact=1
                          display: baby
                        - selected: false
                          query_string: ?age__exact=2
                          display: also a baby
                      list_display_fields:
                      - name
                      - age
                      - user
                      - title
                      editing_fields:
                      - type: CharField
                        name: title
                        attrs:
                          read_only: false
                          write_only: false
                          required: false
                          default: null
                          allow_blank: false
                          allow_null: true
                          style: {}
                          label: Title
                          help_text: null
                          initial: ''
                          max_length: 20
                          min_length: null
                          trim_whitespace: true
                    columns:
                    - field: name
                      headerName: name
                    - field: age
                      headerName: age
                    - field: user
                      headerName: user
                    - field: is_old_enough
                      headerName: is this author old enough
                    - field: title
                      headerName: title
                    rows:
                    - change_url: http://localhost:8000/api_admin/test_django_api_admin/author/1/change/
                      id: 1
                      cells:
                        name: Muhammad
                        age: '60'
                        user: ms
                        is_old_enough: true
                        title: '-'
                  summary: Example of a successful changelist retrieval
                  description: Returns a paginated list of records with optional filters
                    applied.
          description: Retrieve a list of records with optional filtering and pagination
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Not authenticated
    post:
      operationId: api_admin_auth_group_changelist_create
      description: |-
        Return a JSON object representing the django admin changelist table.
        supports querystring filtering, pagination and search also changes based on list display.
      tags:
      - group
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                SuccessResponse:
                  value:
                    detail: action was performed successfully
                  summary: Example of a successful action execution
                  description: Returns a success message after performing the selected
                    action on chosen objects
          description: Action executed successfully on selected objects
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Not authenticated
    put:
      operationId: api_admin_auth_group_changelist_update
      description: |-
        Return a JSON object representing the django admin changelist table.
        supports querystring filtering, pagination and search also changes based on list display.
      tags:
      - group
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
