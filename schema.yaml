openapi: 3.0.3
info:
  title: Django API Admin
  description: "A rewrite of django.contrib.admin as a Restful API, intended for use\t\
    in the process of creating custom admin panels using frontend frameworks likereact,\
    \ and vue while maintaining an API similar to django.contrib.admin."
  contact: msbizzacc0unt@gmail.com
  license:
    name: MIT License
    url: https://github.com/demon-bixia/django-api-admin/blob/production/LICENSE
  version: 1.0.0
paths:
  /api/author/{id}/:
    get:
      operationId: api_author_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
          description: ''
  /api/publisher/{id}/:
    get:
      operationId: api_publisher_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publisher'
          description: ''
  /api_admin/:
    get:
      operationId: List registered applications
      description: Retrieve a list of all the apps that have models registered in
        the admin site.
      tags:
      - api_admin
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppList'
          description: List of objects with application details
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Not authenticated
  /api_admin/{app_label}/:
    get:
      operationId: Get registered app details
      description: Retrieve an app that has models registered in the admin site using
        `app_label`.
      parameters:
      - in: path
        name: app_label
        schema:
          type: string
        description: The label of the app to retrieve details for.
        required: true
      tags:
      - api_admin
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
          description: Application detail for the given `app_label`
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Not authenticated
  /api_admin/auth/group/{object_id}/change/:
    get:
      operationId: api_admin_auth_group_change_retrieve
      description: |-
        Change an existing instance of this model. If the models has inline models associated with it, then
        create, update, and delete instances of the inline models as well.
      parameters:
      - in: path
        name: object_id
        schema:
          type: string
        required: true
      tags:
      - group
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormFields'
              examples:
                SuccessResponse:
                  value:
                    fields:
                    - type: CharField
                      name: field_name
                      attrs:
                        read_only: false
                        write_only: true
                        required: true
                        default: null
                        allow_blank: false
                        allow_null: false
                        label: Field name
                        help_text: null
                        initial: ''
                        max_length: null
                        min_length: null
                        trim_whitespace: true
                  summary: Example of a successful field attribute response
                  description: Retrieve form field attributes for the password change
                    endpoint
          description: Successfully returned the field attributes list
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Not authenticated
    put:
      operationId: api_admin_auth_group_change_update
      description: |-
        Change an existing instance of this model. If the models has inline models associated with it, then
        create, update, and delete instances of the inline models as well.
      parameters:
      - in: path
        name: object_id
        schema:
          type: string
        required: true
      tags:
      - group
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Group'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Group'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUpdatesResponse'
              examples:
                UpdateSuccessResponse:
                  value:
                    detail: The author “René Descartes” was changed successfully.
                    data:
                      id: 1
                      name: Renene Descartes
                      age: 60
                      is_vip: true
                      date_joined: '2025-02-05T04:12:12.191849Z'
                      title: null
                      user: 1
                      publisher:
                      - 1
                      pk: 1
                    updated_inlines:
                    - id: 1
                      title: The book of nine secrets
                      author: 1
                      credits:
                      - 2
                      pk: 1
                    - id: 2
                      title: purple thunder lightning technique
                      author: 1
                      credits:
                      - 2
                      pk: 2
                    deleted_inlines:
                    - id: 3
                      title: Pro git
                      author: 1
                      credits: []
                      pk: 3
                  summary: Example of a successful Update operation response
          description: Successfully returned the field attributes list
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                PermissionDenied:
                  value:
                    detail: You do not have permission to perform this action.
                  summary: Permission denied
          description: Forbidden
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Not authenticated
    patch:
      operationId: api_admin_auth_group_change_partial_update
      description: |-
        Change an existing instance of this model. If the models has inline models associated with it, then
