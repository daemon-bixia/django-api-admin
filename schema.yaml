                      list_display:
                      - name
                      - age
                      - user
                      - is_old_enough
                      - title
                      - gender
                      list_display_links:
                      - name
                      list_editable:
                      - title
                      exclude:
                      - gender
                      show_full_result_count: true
                      list_per_page: 6
                      list_max_show_all: 200
                      date_hierarchy: date_joined
                      search_help_text: null
                      sortable_by: null
                      search_fields:
                      - name
                      - publisher__name
