                      - - make_old
                        - make all authors old
                      - - make_young
                        - make all authors young
                      filters:
                      - title: is vip
                        choices:
                        - selected: true
                          query_string: '?'
                          display: All
                        - selected: false
                          query_string: ?is_vip__exact=1
                          display: 'Yes'
                        - selected: false
                          query_string: ?is_vip__exact=0
                          display: 'No'
                      - title: age
                        choices:
                        - selected: true
                          query_string: '?'
                          display: All
                        - selected: false
                          query_string: ?age__exact=60
