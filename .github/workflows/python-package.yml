# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches:
      - "prd/**"
  pull_request:
    branches:
      - "prd/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Install the latest version of uv and set the python version ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true # Ensures lightning-fast subsequent runs
      - name: Install dependencies
        run: |
          uv sync --group test
      - name: Lint with ruff
        run: |
          # ruff automatically ignores .venv, respect your pyproject.toml, and runs instantly
          uv run ruff check .
      - name: Test with unitest
        run: |
          uv run python ./tests/runtests.py
